name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "SertlikTakip" --collect-all tkinterdnd2 sertlik_takip.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SertlikTakip-Windows
          path: dist/SertlikTakip.exe
